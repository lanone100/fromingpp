<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>膠片長度計算器 v9</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --bg-soft: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-soft);
            color: #1e293b;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            margin-top: 20px;
        }

        /* 標題區域 */
        .header-panel {
            background: var(--brand-gradient);
            border-radius: 24px 24px 0 0;
            padding: 30px 20px;
            text-align: center;
            color: white;
            box-shadow: var(--card-shadow);
        }

        .header-panel h1 {
            font-size: 1.6rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header-panel p {
            font-size: 0.85rem;
            opacity: 0.9;
            font-family: 'Montserrat', sans-serif;
        }

        /* 主要內容卡片 */
        .main-card {
            background: white;
            border-radius: 0 0 24px 24px;
            padding: 25px 20px;
            box-shadow: var(--card-shadow);
        }

        /* 模式切換按鈕 */
        .mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-tab {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            color: #64748b;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .mode-tab.active {
            border-color: var(--brand-blue);
            color: var(--brand-blue);
            background: #eff6ff;
        }

        /* 表單設計 */
        .form-row {
            margin-bottom: 20px;
        }

        .form-row label {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
            appearance: none;
        }

        .input-wrapper input:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .unit-tag {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-weight: 700;
            pointer-events: none;
        }

        /* 計算按鈕 */
        .btn-calc {
            width: 100%;
            background: var(--brand-gradient);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            margin-top: 10px;
            transition: transform 0.1s;
        }

        .btn-calc:active {
            transform: scale(0.97);
        }

        /* 結果顯示 */
        #result-box {
            margin-top: 25px;
            background: #f1f5f9;
            border-radius: 16px;
            padding: 20px;
            display: none;
            border-left: 6px solid var(--brand-blue);
        }

        .result-title {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
        }

        /* 腳註公式 */
        .footer-info {
            margin-top: 20px;
            padding: 15px;
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            line-height: 1.5;
        }

        .footer-info b { color: #64748b; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-panel">
        <h1>膠片長度計算器</h1>
        <p>Industrial Film Calculator v9.0</p>
    </div>

    <div class="main-card">
        <div class="mode-selector">
            <div class="mode-tab active" onclick="setMode('L', this)">⚖️ 求長度</div>
            <div class="mode-tab" onclick="setMode('W', this)">📏 求重量</div>
        </div>

        <div class="form-row">
            <label>材料類型</label>
            <div class="input-wrapper">
                <select id="density">
                    <option value="1.34">PET (密度 1.34)</option>
                    <option value="0.91">PP (密度 0.91)</option>
                    <option value="1.38">PVC (密度 1.38)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label>厚度 (Thickness)</label>
            <div class="input-wrapper">
                <input type="number" id="t" placeholder="0.125" step="0.001" inputmode="decimal">
                <span class="unit-tag">mm</span>
            </div>
        </div>

        <div class="form-row">
            <label>寬度 (Width)</label>
            <div class="input-wrapper">
                <input type="number" id="w" placeholder="500" step="0.1" inputmode="decimal">
                <span class="unit-tag">mm</span>
            </div>
        </div>

        <div class="form-row" id="row-weight">
            <label>膠片重量 (Weight)</label>
            <div class="input-wrapper">
                <input type="number" id="weight" placeholder="輸入重量" step="0.01" inputmode="decimal">
                <span class="unit-tag">kg</span>
            </div>
        </div>

        <div class="form-row" id="row-length" style="display:none;">
            <label>膠片長度 (Length)</label>
            <div class="input-wrapper">
                <input type="number" id="length" placeholder="輸入長度" step="1" inputmode="decimal">
                <span class="unit-tag">M</span>
            </div>
        </div>

        <button class="btn-calc" onclick="calculate()">立即計算</button>

        <div id="result-box">
            <p class="result-title" id="res-label">計算結果</p>
            <div class="result-value" id="res-value">--</div>
        </div>

        <div class="footer-info">
            <b>換算公式：</b><br>
            重量(kg) = 厚度(mm) × 寬度(mm) × 長度(M) × 密度 ÷ 1000<br>
            長度(M) = (重量 × 1000) ÷ (厚度 × 寬度 × 密度)
        </div>
    </div>
</div>

<script>
    let mode = 'L'; // L: 求長度, W: 求重量

    function setMode(m, el) {
        mode = m;
        // 切換 Tab 樣式
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');

        // 切換顯示欄位
        document.getElementById('row-weight').style.display = (m === 'L') ? 'block' : 'none';
        document.getElementById('row-length').style.display = (m === 'W') ? 'block' : 'none';
        
        // 重置結果
        document.getElementById('result-box').style.display = 'none';
    }

    function calculate() {
        const d = parseFloat(document.getElementById('density').value);
        const t = parseFloat(document.getElementById('t').value);
        const w = parseFloat(document.getElementById('w').value);
        
        if (!t || !w) {
            alert("請輸入厚度與寬度！");
            return;
        }

        let result = 0;
        let unit = "";
        let label = "";

        if (mode === 'L') {
            const weight = parseFloat(document.getElementById('weight').value);
            if (!weight) { alert("請輸入重量！"); return; }
            result = (weight * 1000) / (t * w * d);
            unit = " M";
            label = "換算總長度：";
        } else {
            const length = parseFloat(document.getElementById('length').value);
            if (!length) { alert("請輸入長度！"); return; }
            result = (t * w * length * d) / 1000;
            unit = " kg";
            label = "預估總重量：";
        }

        // 顯示結果
        const resBox = document.getElementById('result-box');
        document.getElementById('res-label').innerText = label;
        document.getElementById('res-value').innerText = result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 3}) + unit;
        
        resBox.style.display = 'block';
    }
</script>

</body>
</html>
